    // Build markers

      let featuredSection = "";

    // ── Generic dropdown toggle ──
    function togglePanel(btn, panel) {
      const isOpen = panel.classList.contains("open");
      document.querySelectorAll(".ms-panel.open").forEach(p => p.classList.remove("open"));
      if (!isOpen) panel.classList.add("open");
    }
    regionBtn.addEventListener("click", () => togglePanel(regionBtn, regionPanel));
    schoolBtn.addEventListener("click", () => { if (!schoolBtn.disabled) togglePanel(schoolBtn, schoolPanel); });
    document.addEventListener("click", e => {
      if (!e.target.closest(".ms-wrap")) document.querySelectorAll(".ms-panel.open").forEach(p => p.classList.remove("open"));
    });

    // ── Build region panel ──
    const regions = [...new Set(centres.map(c => c.region))];
    regions.forEach(r => {
      const label = document.createElement("label");
      label.className = "ms-item";
      const cb = document.createElement("input");
      cb.type = "checkbox"; cb.value = r;
      cb.addEventListener("change", () => {
        cb.checked ? selectedRegions.add(r) : selectedRegions.delete(r);
        rebuildSchoolPanel();
        applyFilters();
      });
      label.append(cb, r);
      regionPanel.appendChild(label);
    });
    const regionClear = document.createElement("span");
    regionClear.className = "ms-clear"; regionClear.textContent = "Clear";
    regionClear.addEventListener("click", () => {
      regionPanel.querySelectorAll("input").forEach(cb => cb.checked = false);
      selectedRegions.clear();
      rebuildSchoolPanel();
      applyFilters();
    });
    regionPanel.appendChild(regionClear);

    // ── Build / rebuild school panel ──
    function rebuildSchoolPanel() {
      schoolPanel.innerHTML = "";
      const pool = selectedRegions.size
        ? centres.filter(c => selectedRegions.has(c.region))
        : centres;

      // Remove any selected schools no longer in the pool
      selectedSchools.forEach(no => { if (!pool.find(c => c.no === no)) selectedSchools.delete(no); });

      pool.forEach(c => {
        const label = document.createElement("label");
        label.className = "ms-item";
        const cb = document.createElement("input");
        cb.type = "checkbox"; cb.value = c.no;
        cb.checked = selectedSchools.has(c.no);
        cb.addEventListener("change", () => {
          cb.checked ? selectedSchools.add(c.no) : selectedSchools.delete(c.no);
          applyFilters();

        label.append(cb, `${c.university} — ${c.center}`);

      const schoolClear = document.createElement("span");
      schoolClear.className = "ms-clear"; schoolClear.textContent = "Clear";
      schoolClear.addEventListener("click", () => {
        schoolPanel.querySelectorAll("input").forEach(cb => cb.checked = false);
        selectedSchools.clear();
        applyFilters();
      });
      schoolPanel.appendChild(schoolClear);

      schoolBtn.disabled = false;
    }
    rebuildSchoolPanel();

    // ── Apply filters ──
    function applyFilters() {
      // Update button labels
      regionBtn.textContent = selectedRegions.size
        ? (selectedRegions.size === 1 ? [...selectedRegions][0] : `${selectedRegions.size} regions`)
        : "All regions";
      schoolBtn.textContent = selectedSchools.size
        ? `${selectedSchools.size} school${selectedSchools.size > 1 ? "s" : ""} selected`
        : "All schools";

      let visible = 0;
      const visibleMarkers = [];
      markers.forEach(({ centre: c, marker }) => {
        const matchRegion   = !selectedRegions.size || selectedRegions.has(c.region);
        const matchSchool   = !selectedSchools.size || selectedSchools.has(c.no);
        const matchFeatured = !featuredOnly || featuredNos.has(c.no);
        if (matchRegion && matchSchool && matchFeatured) {
          marker.addTo(map);
          visibleMarkers.push([c.lat, c.lon]);
          visible++;
        } else {
          marker.remove();
        }
      });

      // Fly to fit visible markers
      if (visibleMarkers.length && visibleMarkers.length < centres.length) {
        if (visibleMarkers.length === 1) {
          map.flyTo(visibleMarkers[0], 14, { duration: 1 });
        } else {
          map.flyToBounds(visibleMarkers, { padding: [60, 60], duration: 1 });
        }
      } else if (!visibleMarkers.length || visibleMarkers.length === centres.length) {
        map.flyTo([23.85, 120.95], 8, { duration: 1 });
      }

      countLabel.textContent = `${visible} centre${visible !== 1 ? "s" : ""} shown`;
    }

    // Legend
    const legend = L.control({ position: "bottomright" });
    legend.onAdd = () => {
      const div = L.DomUtil.create("div");
      div.style.cssText = "background:white;padding:10px 14px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.2);font-size:.8rem;line-height:1.8";
      div.innerHTML = Object.entries(regionColours).map(([name, col]) =>
        `<div style="display:flex;align-items:center;gap:8px">
           <span style="width:12px;height:12px;border-radius:50%;background:${col};display:inline-block;flex-shrink:0"></span>
           ${name}
         </div>`
      ).join("");
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
